spring.application.name=apigateway

server.port=9090

spring.cloud.gateway.server.webmvc.routes[0].id=usuarios
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**


spring.cloud.gateway.server.webmvc.routes[1].id=pacientes
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/pacientes/**
spring.cloud.gateway.server.webmvc.routes[1].predicates[1]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[2].id=agenda
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/**