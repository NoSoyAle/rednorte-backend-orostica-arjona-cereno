services:
  mysql-admin:
    image: mysql:8.0
    container_name: mysql-admin
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_ADMIN}
    ports:
      - "3307:3306"
    volumes:
      - mysql-admin-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rednorte-network

  mysql-paciente:
    image: mysql:8.0
    container_name: mysql-paciente
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_PACIENTE}
    ports:
      - "3308:3306"
    volumes:
      - mysql-paciente-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rednorte-network

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-admin:3306/${DB_ADMIN}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "8092:8082"
    depends_on:
      mysql-admin:
        condition: service_healthy
    networks:
      - rednorte-network

  paciente:
    build:
      context: ./paciente
      dockerfile: Dockerfile
    container_name: paciente
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-paciente:3306/${DB_PACIENTE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8093:8083"
    depends_on:
      mysql-paciente:
        condition: service_healthy
    networks:
      - rednorte-network

volumes:
  mysql-admin-data:
  mysql-paciente-data:

networks:
  rednorte-network:
    driver: bridge
