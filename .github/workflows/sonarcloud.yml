name: SonarCloud Analysis

on:
  push:
    branches: [main, Catalina]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  admin-service-analysis:
    name: Admin Service - SonarCloud Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with coverage
        run: mvn clean verify -B

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=rednorte-admin-service \
            -Dsonar.organization=rednorte-organization \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  paciente-analysis:
    name: Paciente Service - SonarCloud Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paciente
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with coverage
        run: mvn clean verify -B

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=rednorte-paciente \
            -Dsonar.organization=rednorte-organization \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [admin-service-analysis, paciente-analysis]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Wait for SonarCloud processing
        run: sleep 30

      - name: Check Admin Service Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u $SONAR_TOKEN: \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=rednorte-admin-service" | \
            jq -r '.projectStatus.status')
          echo "Admin Service Quality Gate: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate failed for admin-service"
            exit 1
          fi

      - name: Check Paciente Service Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u $SONAR_TOKEN: \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=rednorte-paciente" | \
            jq -r '.projectStatus.status')
          echo "Paciente Service Quality Gate: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate failed for paciente"
            exit 1
          fi
