<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de espera clinica</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="topbar">
        <div>
            <h1>Lista de espera clinica</h1>
            <p>Gestion de solicitudes, priorizacion y asignacion de horas.</p>
        </div>
        <div class="api-status" id="apiStatus">Verificando API</div>
    </header>

    <main class="layout">
        <section class="panel form-panel">
            <div class="panel-title">
                <h2>Nueva solicitud</h2>
                <button type="button" id="refreshBtn">Actualizar</button>
            </div>

            <form id="createForm" class="form-grid">
                <label>
                    Paciente ID
                    <input name="pacienteId" type="number" min="1" required>
                </label>
                <label>
                    Especialidad ID
                    <input name="especialidadId" type="number" min="1" required>
                </label>
                <label>
                    Doctor ID
                    <input name="doctorId" type="number" min="1">
                </label>
                <label>
                    Prioridad
                    <select name="prioridad" required>
                        <option value="1">Alta</option>
                        <option value="2">Media</option>
                        <option value="3">Baja</option>
                    </select>
                </label>
                <label class="wide">
                    Motivo
                    <input name="motivo" type="text" placeholder="No hay horas disponibles">
                </label>
                <label class="wide">
                    Observaciones
                    <textarea name="observaciones" rows="3" placeholder="Detalle adicional"></textarea>
                </label>
                <button class="primary wide" type="submit">Agregar a lista</button>
            </form>
        </section>

        <section class="panel filters-panel">
            <h2>Filtros y acciones</h2>
            <div class="filters">
                <label>
                    Estado
                    <select id="estadoFilter">
                        <option value="">Todos</option>
                        <option>ESPERANDO</option>
                        <option>CONTACTADO</option>
                        <option>ASIGNADO</option>
                        <option>CANCELADO</option>
                        <option>EXPIRADO</option>
                        <option>RECHAZADO</option>
                    </select>
                </label>
                <label>
                    Paciente ID
                    <input id="pacienteFilter" type="number" min="1">
                </label>
                <label>
                    Especialidad ID
                    <input id="especialidadFilter" type="number" min="1">
                </label>
                <button type="button" id="applyFiltersBtn">Aplicar filtros</button>
                <button type="button" id="clearFiltersBtn">Limpiar</button>
            </div>

            <div class="next-box">
                <label>
                    Siguiente por especialidad
                    <input id="nextEspecialidadId" type="number" min="1" placeholder="Especialidad ID">
                </label>
                <button type="button" id="nextBtn">Buscar siguiente</button>
            </div>
        </section>

        <section class="panel table-panel">
            <div class="panel-title">
                <h2>Solicitudes registradas</h2>
                <span id="countBadge">0 registros</span>
            </div>
            <div id="message" class="message" hidden></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Especialidad</th>
                            <th>Doctor</th>
                            <th>Bloque</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Ingreso</th>
                            <th>Motivo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <dialog id="assignDialog">
        <form method="dialog" id="assignForm" class="dialog-form">
            <h2>Asignar hora</h2>
            <input type="hidden" name="id">
            <label>
                Doctor ID
                <input name="doctorId" type="number" min="1" required>
            </label>
            <label>
                Bloque horario ID
                <input name="bloqueHorarioId" type="number" min="1" required>
            </label>
            <label>
                Observaciones
                <textarea name="observaciones" rows="3"></textarea>
            </label>
            <div class="dialog-actions">
                <button type="button" id="cancelAssignBtn">Cancelar</button>
                <button class="primary" type="submit">Asignar</button>
            </div>
        </form>
    </dialog>

    <script src="/app.js"></script>
</body>
</html>
